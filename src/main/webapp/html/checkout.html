<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="author" content="FarmGo Team">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Checkout - Farm2Home</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.min.css' />
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css' />
</head>

<body>
  <nav class="navbar navbar-expand-md bg-dark navbar-dark">
    <!-- Brand -->
    <a class="navbar-brand" href="index.html"><i class="fa fa-home"></i>&nbsp;&nbsp;FARM TO HOME</a>
    <!-- Toggler/collapsibe Button -->
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>
    <!-- Navbar links -->
    <div class="collapse navbar-collapse" id="collapsibleNavbar">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="shopping.html">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="checkout.html"><i class="fas fa-money-check-alt mr-2"></i>Checkout</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="wishlist.html"><i class="fas fa-heart"></i> <span id="wishlist-item" class="badge badge-danger"></span></a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="cart.html"><i class="fas fa-shopping-cart"></i> <span id="cart-item" class="badge badge-danger"></span></a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 px-4 pb-4" id="order">
        <div id="message"></div>
        <div id="realtime-notifications" class="mb-3"></div>
        <h4 class="text-center text-info p-2">Complete your order!</h4>
        <div id="order-summary">
          <div class="text-center">
            <div class="spinner-border" role="status">
              <span class="sr-only">Loading...</span>
            </div>
            <p>Loading order summary...</p>
          </div>
        </div>
        <form action="" method="post" id="placeOrder">
          <div class="form-group">
            <input type="text" name="name" class="form-control" placeholder="Enter Name" required>
          </div>
          <div class="form-group">
            <input type="email" name="email" class="form-control" placeholder="Enter E-Mail" required>
          </div>
          <div class="form-group">
            <input type="tel" name="phone" class="form-control" placeholder="Enter Phone" required>
          </div>
          <div class="form-group">
            <textarea name="address" class="form-control" rows="3" cols="10" placeholder="Enter Delivery Address Here..."></textarea>
          </div>
          <h6 class="text-center lead">Select Payment Mode</h6>
          <div class="form-group">
            <select name="pmode" class="form-control" required>
              <option value="" selected disabled>-Select Payment Mode-</option>
              <option value="cod">Cash On Delivery</option>
              <option value="netbanking">Net Banking</option>
              <option value="cards">Debit/Credit Card</option>
            </select>
          </div>
          <div class="form-group">
            <input type="submit" name="submit" value="Place Order" class="btn btn-danger btn-block">
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js'></script>
  <script src='https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/js/bootstrap.min.js'></script>

  <script type="text/javascript">
  $(document).ready(function() {
    // Initialize WebSocket connection
    var ws = new WebSocket("ws://localhost:8080/farmgo/notifications");
    
    ws.onopen = function(event) {
      console.log("WebSocket connection opened");
      showNotification("Connected to real-time notifications", "success");
    };
    
    ws.onmessage = function(event) {
      var data = JSON.parse(event.data);
      console.log("Received message:", data);
      
      if (data.type === "inventory_update") {
        showNotification("Inventory update: " + data.data.message, "info");
      } else if (data.type === "order_status") {
        showNotification("Order update: " + data.data.message, "info");
      } else if (data.type === "welcome") {
        console.log(data.message);
      } else if (data.type === "echo") {
        console.log("Echo: " + data.message);
      }
    };
    
    ws.onclose = function(event) {
      console.log("WebSocket connection closed");
      showNotification("Real-time notifications disconnected", "warning");
    };
    
    ws.onerror = function(error) {
      console.log("WebSocket error:", error);
      showNotification("Real-time notifications error", "danger");
    };
    
    // Function to show notifications
    function showNotification(message, type) {
      var alertClass = "alert-" + type;
      var notificationHtml = '<div class="alert ' + alertClass + ' alert-dismissible fade show" role="alert">' +
        message +
        '<button type="button" class="close" data-dismiss="alert" aria-label="Close">' +
        '<span aria-hidden="true">&times;</span>' +
        '</button>' +
        '</div>';
      
      $("#realtime-notifications").html(notificationHtml);
      
      // Auto-hide after 5 seconds
      setTimeout(function() {
        $("#realtime-notifications").html("");
      }, 5000);
    }
    
    // Load order summary
    loadOrderSummary();
    
    // Load total no.of items added in the cart and display in the navbar
    load_cart_item_number();
    load_wishlist_item_number();

    // Sending Form data to the server
    $("#placeOrder").submit(function(e) {
      e.preventDefault();
      
      $.ajax({
        url: '../api/order/place',
        method: 'post',
        data: $('form').serialize(),
        success: function(response) {
          if (response.status === "success") {
            $("#order").html('<div class="text-center"><h1 class="display-4 mt-2 text-danger">Thank You!</h1><h2 class="text-success">' + response.message + '</h2><h4 class="bg-danger text-light rounded p-2">Items Purchased : ' + response.orderDetails.products + '</h4><h4>Your Name : ' + response.orderDetails.name + '</h4><h4>Your E-mail : ' + response.orderDetails.email + '</h4><h4>Your Phone : ' + response.orderDetails.phone + '</h4><h4>Total Amount Paid : ' + parseFloat(response.orderDetails.amountPaid).toFixed(2) + '</h4><h4>Payment Mode : ' + response.orderDetails.pmode + '</h4></div>');
          } else {
            alert("Error placing order: " + response.message);
          }
        },
        error: function(xhr, status, error) {
          alert("Error placing order: " + error);
        }
      });
    });

    function loadOrderSummary() {
      $.ajax({
        url: '../api/order/summary',
        method: 'get',
        success: function(response) {
          if (response.items && response.totalAmount) {
            var summaryHtml = '<div class="jumbotron p-3 mb-2 text-center">' +
              '<h6 class="lead"><b>Product(s) : </b>' + response.items + '</h6>' +
              '<h6 class="lead"><b>Delivery Charge : </b>Free</h6>' +
              '<h5><b>Total Amount Payable : </b><i class="fas fa-rupee-sign"></i> ' + parseFloat(response.totalAmount).toFixed(2) + '/-</h5>' +
              '</div>';
            $("#order-summary").html(summaryHtml);
          } else {
            $("#order-summary").html('<div class="alert alert-info">Your cart is empty. <a href="shopping.html">Continue shopping</a></div>');
            $("input[type='submit']").prop('disabled', true);
          }
        },
        error: function(xhr, status, error) {
          $("#order-summary").html('<div class="alert alert-danger">Error loading order summary: ' + error + '</div>');
        }
      });
    }

    function load_cart_item_number() {
      $.ajax({
        url: '../api/cart/count',
        method: 'get',
        success: function(response) {
          $("#cart-item").html(response.count);
        },
        error: function(xhr, status, error) {
          console.log("Error loading cart count: " + error);
        }
      });
    }
    
    function load_wishlist_item_number() {
      $.ajax({
        url: '../api/wishlist/count',
        method: 'get',
        success: function(response) {
          $("#wishlist-item").html(response.count);
        },
        error: function(xhr, status, error) {
          console.log("Error loading wishlist count: " + error);
        }
      });
    }
  });
  </script>
</body>
</html>
