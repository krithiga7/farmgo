<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="user_login">User Login - Farm2Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            z-index: 0;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 16px;
        }

        .login-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .login-icon i {
            color: white;
            font-size: 35px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }

        .form-control {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e1e1e1;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
            background: white;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            position: relative;
            z-index: 1;
        }

        .login-footer a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .login-footer a:hover {
            color: #00f2fe;
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            position: relative;
            z-index: 1;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e1e1e1;
        }

        .divider span {
            padding: 0 15px;
            color: #777;
            font-size: 14px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .facebook {
            background: #3b5998;
        }

        .google {
            background: #dd4b39;
        }

        .twitter {
            background: #1da1f2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
            position: relative;
            z-index: 1;
        }

        .success-message {
            background: #efe;
            color: #363;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #363;
            display: none;
            position: relative;
            z-index: 1;
        }

        .language-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .language-option {
            padding: 8px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            background: white;
        }

        .language-option.active {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        .language-option:hover {
            border-color: #4facfe;
        }

        @media (max-width: 576px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="language-selector">
            <div class="language-option active" data-lang="en">English</div>
            <div class="language-option" data-lang="hi">हिंदी</div>
            <div class="language-option" data-lang="ta">தமிழ்</div>
            <div class="language-option" data-lang="ml">മലയാളം</div>
            <div class="language-option" data-lang="kn">ಕನ್ನಡ</div>
            <div class="language-option" data-lang="te">తెలుగు</div>
        </div>

        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <h1 data-i18n="user_login">User Login</h1>
            <p data-i18n="welcome_back">Welcome back! Please login to your account</p>
        </div>

        <div class="error-message" id="error-message" data-i18n="invalid_credentials">
            Invalid email or password. Please try again.
        </div>

        <div class="success-message" id="success-message" data-i18n="login_success">
            Login successful! Redirecting...
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email" data-i18n="email">Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password" data-i18n="password">Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> <span data-i18n="login">Login</span>
            </button>
        </form>

        <div class="divider">
            <span data-i18n="or">OR</span>
        </div>

        <div class="social-login">
            <button class="social-btn facebook">
                <i class="fab fa-facebook-f"></i>
            </button>
            <button class="social-btn google">
                <i class="fab fa-google"></i>
            </button>
            <button class="social-btn twitter">
                <i class="fab fa-twitter"></i>
            </button>
        </div>

        <div class="login-footer">
            <p data-i18n="no_account">Don't have an account? <a href="user-register.html" data-i18n="register_here">Register here</a></p>
            <p><a href="farmer-login-professional.html" data-i18n="login_as_farmer">Login as Farmer</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="../js/i18n.js"></script>
    <script>
        $(document).ready(function() {
            // Initialize i18n service
            window.i18nService.initialize();
            
            // Language selector functionality
            $('.language-option').on('click', function() {
                $('.language-option').removeClass('active');
                $(this).addClass('active');
                const selectedLang = $(this).data('lang');
                window.i18nService.setLanguage(selectedLang);
            });
            
            $('#login-form').on('submit', function(e) {
                e.preventDefault();
                
                const email = $('#email').val();
                const password = $('#password').val();
                
                // Hide previous messages
                $('#error-message').hide();
                $('#success-message').hide();
                
                // Simple validation
                if (!email || !password) {
                    $('#error-message').text(window.i18nService.translate('fill_all_fields')).show();
                    return;
                }
                
                // Simulate login process
                // In a real application, you would send this to your backend
                if (email === 'customer1@gmail.com' && password === 'customer123') {
                    $('#success-message').text(window.i18nService.translate('login_success')).show();
                    setTimeout(function() {
                        window.location.href = 'user-dashboard.html';
                    }, 1500);
                } else {
                    $('#error-message').text(window.i18nService.translate('invalid_credentials')).show();
                }
            });
        });
    </script>
</body>
</html>
